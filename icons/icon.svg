<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1A1D21"/>

  <!-- Ledger page -->
  <rect x="96" y="96" width="320" height="320" rx="16" fill="#23272D"/>

  <!-- Column divider -->
  <rect x="290" y="112" width="2" height="288" fill="#333840"/>

  <!-- Header row -->
  <rect x="110" y="112" width="178" height="32" rx="0" fill="#2D3138"/>
  <rect x="292" y="112" width="110" height="32" rx="0" fill="#2D3138"/>

  <!-- Row 1: income -->
  <rect x="116" y="156" width="120" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
  <rect x="116" y="170" width="80" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="156" width="88" height="16" rx="4" fill="#0E7C66"/>

  <!-- Row 2: expense -->
  <rect x="116" y="198" width="140" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
  <rect x="116" y="212" width="90" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="198" width="66" height="16" rx="4" fill="#C43A31"/>

  <!-- Row 3: income -->
  <rect x="116" y="240" width="100" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
  <rect x="116" y="254" width="70" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="240" width="95" height="16" rx="4" fill="#0E7C66"/>

  <!-- Row 4: expense -->
  <rect x="116" y="282" width="130" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
  <rect x="116" y="296" width="85" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="282" width="50" height="16" rx="4" fill="#C43A31"/>

  <!-- Row 5: income -->
  <rect x="116" y="324" width="110" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
  <rect x="116" y="338" width="75" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="324" width="78" height="16" rx="4" fill="#0E7C66"/>

  <!-- Row separators -->
  <rect x="110" y="190" width="292" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="110" y="232" width="292" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="110" y="274" width="292" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="110" y="316" width="292" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- ¥ badge top-right -->
  <circle cx="384" cy="128" r="36" fill="#0E7C66"/>
  <text x="384" y="141" font-family="'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="900"
        fill="white" text-anchor="middle">¥</text>
</svg>

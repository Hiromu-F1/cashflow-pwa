<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>資金通帳</title>
<meta name="theme-color" content="#1A1D21">
<meta name="description" content="キャッシュフローを月次で管理するPWAアプリ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資金通帳">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<style>
  :root{
    --ink:#1A1D21; --bg:#FBFBF9; --line:#E7E6E1; --mut:#8A8F98;
    --in:#0E7C66; --out:#C43A31;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    font-feature-settings:"tnum";
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:calc(60px + env(safe-area-inset-bottom))}
  /* ヘッダー固定 */
  #stickyTop{position:sticky;top:0;z-index:10;background:var(--bg);padding-top:env(safe-area-inset-top)}
  header{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 20px 6px}
  .eyebrow{font-size:11px;letter-spacing:.25em;color:var(--mut);margin-bottom:4px}
  .bal-label{font-size:12px;color:var(--mut);margin-bottom:2px}
  .bal-row{display:flex;align-items:baseline;gap:8px}
  .balance{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .balance.neg{color:var(--out)}
  .prov-toggle-inline{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--mut);cursor:pointer;user-select:none;padding-bottom:2px;flex-shrink:0}
  .prov-toggle-inline input[type=checkbox]{width:13px;height:13px;padding:0;border:none;background:none;accent-color:#D97706;flex-shrink:0}
  #saveTag{font-size:11px;color:var(--mut);padding-top:2px;min-height:16px}
  nav{display:flex;gap:6px;padding:8px max(20px,env(safe-area-inset-right)) 12px max(20px,env(safe-area-inset-left));border-bottom:1px solid var(--line)}
  nav button{flex:1;padding:9px 0;font-size:13px;border-radius:8px;border:1px solid var(--line);
      background:#fff;color:#5A5F68;cursor:pointer}
  nav button.active{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  main{padding-bottom:20px}
  /* 年見出し区切り */
  .year-divider{padding:16px 20px 2px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.1em}
  .year-divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .month{padding:6px 20px 4px}
  .month-head{display:flex;justify-content:space-between;align-items:center;
      padding-bottom:8px;border-bottom:2px solid var(--ink);font-size:14px;cursor:pointer;user-select:none}
  .month-head:active{opacity:.7}
  .month-head-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .month-head-sums{display:flex;align-items:center;gap:8px}
  .prov-hint-sm{font-size:10px;color:#B45309}
  .collapse-btn{color:var(--mut);background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;line-height:0}
  /* シェブロンSVG */
  .chev{display:inline-block;vertical-align:middle;flex-shrink:0;transition:transform .18s ease}
  .chev-up{transform:rotate(180deg)}
  .month-head b{font-weight:700}
  .now-badge{margin-left:8px;font-size:10px;font-weight:700;color:#fff;background:var(--ink);
      border-radius:4px;padding:2px 6px;vertical-align:middle}
  .sums{display:flex;gap:12px;font-size:12px;font-variant-numeric:tabular-nums}
  .sums .i{color:var(--in)} .sums .o{color:var(--out)}
  .empty{padding:14px 0;font-size:12px;color:#B0B3B8}
  .row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px dashed var(--line)}
  .row.past{opacity:.55}
  .r-left{flex:1;display:flex;align-items:baseline;gap:10px;min-width:0}
  .r-date{font-size:12px;color:var(--mut);width:38px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .r-name{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fx-badge{margin-left:6px;font-size:10px;color:#4A5568;background:#EDEFF3;border-radius:4px;padding:1px 5px}
  .r-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
  .amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
  .amt.i{color:var(--in)} .amt.o{color:var(--out)}
  .run{font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
  .run.neg{color:var(--out)}
  .row[data-fxid]{cursor:pointer}
  .row[data-fxid]:active{background:rgba(0,0,0,.04);border-radius:6px;margin:0 -4px;padding-left:4px;padding-right:4px}
  form,.pane{padding:20px;display:flex;flex-direction:column;gap:14px}
  .type-switch{display:flex;gap:8px}
  .type-switch button{flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--line);
      background:#fff;font-size:14px;cursor:pointer;color:#5A5F68}
  .type-switch button.sel-in{background:var(--in);border-color:var(--in);color:#fff;font-weight:700}
  .type-switch button.sel-out{background:var(--out);border-color:var(--out);color:#fff;font-weight:700}
  label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:#5A5F68}
  input,select{padding:11px 12px;border-radius:8px;border:1px solid #D9D8D2;font-size:16px;background:#fff;color:var(--ink)}
  .primary{margin-top:6px;padding:13px 0;border-radius:10px;border:none;background:var(--ink);
      color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .danger{background:#fff;color:var(--out);border:1px solid var(--out)}
  .hint{font-size:12px;color:var(--mut)}
  .split{display:flex;gap:10px}
  .split label:first-child{flex:1}
  .split label:last-child{width:100px}
  .hidden{display:none}
  .io-row{display:flex;gap:8px}
  .io-row button{flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--line);background:#fff;
      font-size:13px;cursor:pointer;color:#5A5F68}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}.chev{transition:none}}
  /* Action sheet */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
  .sheet-overlay.hidden{display:none}
  .sheet{width:100%;max-width:560px;background:#fff;border-radius:20px 20px 0 0;padding:0 12px calc(20px + env(safe-area-inset-bottom));animation:slideUp .2s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-handle{width:36px;height:4px;background:#D1D3D8;border-radius:2px;margin:12px auto 6px}
  .sheet-info{text-align:center;padding:6px 0 10px;font-size:13px;color:var(--mut);border-bottom:1px solid var(--line);margin-bottom:6px}
  .sheet-btn{display:block;width:100%;padding:15px 12px;border:none;background:none;font-size:16px;cursor:pointer;border-radius:10px;text-align:center;color:var(--ink);margin-bottom:2px}
  .sheet-btn:active{background:var(--line)}
  .sheet-btn-accent{color:var(--in);font-weight:700}
  .sheet-btn-danger{color:var(--out)}
  .sheet-btn-cancel{color:var(--mut);border-top:1px solid var(--line);margin-top:6px;padding-top:14px}
  .row[data-eid]{cursor:pointer}
  .row[data-eid]:active{background:rgba(0,0,0,.04);border-radius:6px;margin:0 -4px;padding-left:4px;padding-right:4px}
  /* Provisional entries */
  .row.prov{border-bottom-style:dashed;border-bottom-color:#D97706}
  .row.prov .amt{color:#D97706!important}
  .row.prov .run{color:#B45309}
  .row.prov-off{opacity:.45}
  .prov-badge{margin-left:6px;font-size:10px;color:#92400E;background:#FEF3C7;border-radius:4px;padding:1px 5px}
  .type-switch button.sel-prov{background:#D97706;border-color:#D97706;color:#fff;font-weight:700}
  /* Category chips */
  .chip-row{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;color:#5A5F68;white-space:nowrap;line-height:1.4}
  .chip.sel{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}
  .chip-del{background:none;border:none;color:var(--mut);font-size:13px;padding:0 0 0 4px;cursor:pointer;line-height:1}
  .chip-del:hover{color:var(--out)}
  .cat-badge{margin-left:5px;font-size:10px;color:var(--mut);background:var(--line);border-radius:4px;padding:1px 5px;flex-shrink:0}
  .cat-section-title{font-size:12px;color:#5A5F68;margin-bottom:6px}
  .cat-add-row{display:flex;gap:8px;align-items:flex-end}
  .cat-add-row input{flex:1}
  /* Filter bar */
  .filter-header{padding:8px 20px;border-bottom:1px solid var(--line)}
  .filter-toggle-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;color:#5A5F68;font-weight:500}
  .filter-toggle-btn.filter-active{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700}
  .filter-total-bar{padding:8px 20px;background:#FEF9EC;border-bottom:1px solid #F0D070;font-size:13px;font-variant-numeric:tabular-nums}
  .filter-total-bar span{font-weight:700}
  /* Filter dropdown buttons */
  .filter-dd-bar{display:flex;gap:8px;padding:8px 20px 10px}
  .filter-dd-btn{flex:1;padding:7px 6px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12px;cursor:pointer;color:#5A5F68;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
  .filter-dd-btn.has-filter{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700}
  .filter-dd-btn.dd-open{background:#F0F0EE;border-color:#8A8F98}
  .filter-dd-btn.has-filter.dd-open{background:#3A3F47}
  .filter-dropdown{padding:10px 20px 12px;border-top:1px solid var(--line)}
  .filter-dd-year{font-size:11px;color:var(--mut);margin:6px 0 5px;font-weight:600}
  .chip.chip-cat.sel,.chip.chip-prov.sel{background:#2D5F9E;border-color:#2D5F9E;color:#fff}
  /* 月ピッカー (年送り + 4x3グリッド) */
  .year-nav{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;margin-bottom:8px}
  .year-nav-btn{padding:4px 14px;border:none;background:none;cursor:pointer;font-size:20px;line-height:1;color:var(--ink);border-radius:6px}
  .year-nav-btn:disabled{color:var(--mut);cursor:not-allowed}
  .year-nav-btn:not(:disabled):active{background:var(--line)}
  .month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .month-cell{padding:8px 2px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;text-align:center;color:#5A5F68}
  .month-cell:disabled{opacity:.28;cursor:not-allowed;border-color:transparent}
  .month-cell.sel{background:#5B4FCF;border-color:#5B4FCF;color:#fff;font-weight:700}
  .submit-row{display:flex;gap:10px}
  .submit-row .primary{flex:1;margin-top:0}
  /* 編集後ハイライト */
  @keyframes rowHighlight{0%{background:rgba(217,119,6,.22);border-radius:6px}100%{background:transparent;border-radius:6px}}
  .row-highlight{animation:rowHighlight 1.6s ease-out forwards}
  /* スキップされた固定費行 */
  .row.skipped{opacity:.38}
  .row.skipped .r-name{text-decoration:line-through}
</style>
</head>
<body>
<div class="app">
  <div id="stickyTop">
  <header>
    <div>
      <div class="eyebrow">資金通帳</div>
      <div class="bal-label" id="balLabel"></div>
      <div class="bal-row">
        <div class="balance" id="finalBal"></div>
        <label class="prov-toggle-inline">
          <input type="checkbox" id="toggleProv" checked>
          <span>仮込</span>
        </label>
      </div>
    </div>
    <div id="saveTag"></div>
  </header>

  <nav>
    <button data-tab="ledger" class="active">通帳</button>
    <button data-tab="add">＋ 記帳</button>
    <button data-tab="fixed">固定費</button>
    <button data-tab="settings">設定</button>
  </nav>

  <div id="ledgerFilter">
    <div class="filter-header">
      <button id="btnFilterToggle" class="filter-toggle-btn">絞り込み</button>
    </div>
    <div id="filterPanel" class="hidden">
      <div class="filter-dd-bar">
        <button id="fBtnProv" class="filter-dd-btn">すべて</button>
        <button id="fBtnMonth" class="filter-dd-btn">月</button>
        <button id="fBtnCat" class="filter-dd-btn">カテゴリ</button>
      </div>
      <div id="filterDropdown" class="filter-dropdown hidden"></div>
    </div>
    <div id="filterTotalBar" class="filter-total-bar hidden"></div>
  </div>
  </div><!-- /#stickyTop -->
  <main id="ledger"></main>

  <form id="add" class="hidden" onsubmit="return false">
    <div class="type-switch" id="addType">
      <button type="button" data-v="in">入金</button>
      <button type="button" data-v="out" class="sel-out">出金</button>
    </div>
    <label>日付 <input type="date" id="aDate"></label>
    <div>
      <div class="cat-section-title">カテゴリ</div>
      <div class="chip-row" id="aCatChips"></div>
    </div>
    <label>金額(円) <input id="aAmt" inputmode="numeric" placeholder="50000"></label>
    <label>コメント(任意) <input id="aName" placeholder="例: 家賃、カード引落、給与"></label>
    <div class="type-switch" id="provType">
      <button type="button" data-v="false" class="sel-in">確定</button>
      <button type="button" data-v="true">仮</button>
    </div>
    <div class="submit-row">
      <button class="primary" id="aSubmit">記帳する</button>
      <button type="button" class="primary hidden" id="aCancelEdit" style="background:#8A8F98">キャンセル</button>
    </div>
  </form>

  <div id="fixed" class="pane hidden">
    <p class="hint">毎月自動で通帳に反映されます。</p>
    <div id="fxList"></div>
    <div class="type-switch" id="fxType">
      <button type="button" data-v="in">入金</button>
      <button type="button" data-v="out" class="sel-out">出金</button>
    </div>
    <div>
      <div class="cat-section-title">カテゴリ</div>
      <div class="chip-row" id="fxCatChips"></div>
    </div>
    <div class="split">
      <label>金額(円) <input id="fAmt" inputmode="numeric" placeholder="80000"></label>
      <label>毎月何日 <input id="fDay" inputmode="numeric" value="27"></label>
    </div>
    <label>コメント(任意) <input id="fName" placeholder="例: 家賃"></label>
    <div class="submit-row">
      <button class="primary" id="fSubmit">固定費を追加</button>
      <button type="button" class="primary hidden" id="fxCancelEdit" style="background:#8A8F98">キャンセル</button>
    </div>
  </div>

  <div id="settings" class="pane hidden">
    <label>開始残高(円) <input id="sBal" inputmode="numeric"></label>
    <label>先の表示月数
      <select id="sAhead">
        <option value="1">1ヶ月先まで</option>
        <option value="2">2ヶ月先まで</option>
        <option value="3" selected>3ヶ月先まで</option>
        <option value="4">4ヶ月先まで</option>
        <option value="5">5ヶ月先まで</option>
        <option value="6">6ヶ月先まで</option>
        <option value="7">7ヶ月先まで</option>
        <option value="8">8ヶ月先まで</option>
        <option value="9">9ヶ月先まで</option>
        <option value="10">10ヶ月先まで</option>
        <option value="11">11ヶ月先まで</option>
        <option value="12">12ヶ月先まで</option>
      </select>
    </label>
    <div>
      <div class="cat-section-title">カテゴリ管理</div>
      <div class="chip-row" id="catManage" style="margin-bottom:10px"></div>
      <div class="cat-add-row">
        <input id="newCatInput" placeholder="新しいカテゴリ名">
        <button class="primary" id="btnAddCat" style="padding:11px 16px;margin:0;flex-shrink:0">追加</button>
      </div>
    </div>
    <div class="io-row">
      <button id="btnExport">データ書き出し(JSON)</button>
      <button id="btnImport">データ読み込み</button>
      <input type="file" id="importFile" accept=".json" class="hidden">
    </div>
    <button class="primary danger" id="btnClear">全データを削除</button>
    <button class="primary" id="btnSWUpdate" style="background:#4A5568">アプリを更新（キャッシュ破棄）</button>
    <p class="hint">データはこのブラウザ内(localStorage)に保存されます。別の端末・ブラウザに移すときは書き出し→読み込みを使ってください。</p>
  </div>

  <!-- Action Sheet (fixed costs) -->
  <div id="fxSheet" class="sheet-overlay hidden">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-info" id="fxSheetInfo"></div>
      <button id="fxSheetEdit" class="sheet-btn">編集</button>
      <button id="fxSheetDel" class="sheet-btn sheet-btn-danger">削除</button>
      <button class="sheet-btn sheet-btn-cancel" onclick="hideFxSheet()">キャンセル</button>
    </div>
  </div>

  <!-- Action Sheet (通帳の固定費行 スキップ) -->
  <div id="ledgerFxSheet" class="sheet-overlay hidden">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-info" id="ledgerFxSheetInfo"></div>
      <button id="ledgerFxSheetSkip" class="sheet-btn"></button>
      <button class="sheet-btn sheet-btn-cancel" onclick="hideLedgerFxSheet()">キャンセル</button>
    </div>
  </div>

  <!-- Action Sheet (ledger entries) -->
  <div id="actionSheet" class="sheet-overlay hidden">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-info" id="sheetInfo"></div>
      <button id="sheetConfirm" class="sheet-btn sheet-btn-accent hidden">確定にする</button>
      <button id="sheetEdit" class="sheet-btn">編集</button>
      <button id="sheetDel" class="sheet-btn sheet-btn-danger">削除</button>
      <button class="sheet-btn sheet-btn-cancel" onclick="hideSheet()">キャンセル</button>
    </div>
  </div>
</div>

<script>
"use strict";
const KEY = "cashflow-v1";
const $  = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const pad = (n) => String(n).padStart(2, "0");
const yen = (n) => "¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP");
const uid = () => Math.random().toString(36).slice(2, 10);
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
// 線のみのシェブロンSVG (up=true → ⌃, up=false → ⌄)
const chev = (up) => `<svg class="chev${up?' chev-up':''}" viewBox="0 0 10 6" width="10" height="6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1,1 5,5 9,1"/></svg>`;
const monthKey = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ---------- 月折りたたみ状態 (localStorage, バックアップ対象外) ----------
const COLLAPSE_KEY = "cashflow-collapsed";
let collapsedMonths = new Set();
function loadCollapsed() {
  try { const r = localStorage.getItem(COLLAPSE_KEY); if (r) collapsedMonths = new Set(JSON.parse(r)); } catch {}
}
function saveCollapsed() {
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...collapsedMonths]));
}
function toggleCollapse(mk) {
  if (collapsedMonths.has(mk)) collapsedMonths.delete(mk);
  else collapsedMonths.add(mk);
  saveCollapsed();
  render();
}

// ---------- state ----------
const DEFAULT_CATS = ["旅行","食費","固定費","カード","収入","その他"];
let state = { startBalance: 0, entries: [], fixed: [], fixedSkips: {}, monthsAhead: 3, includeProvisional: true, categories: [...DEFAULT_CATS] };
let addTypeV = "out", fxTypeV = "out", addProvisional = false;
let addCategoryV = "その他", fxCategoryV = "その他";
let editingId = null;

// 旧 name フィールドを comment に統一するマイグレーション
function migrateArr(arr) {
  return arr.map(e => {
    if (e.comment === undefined && e.name !== undefined) {
      const { name, ...rest } = e;
      return { ...rest, comment: name };
    }
    return e;
  });
}
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
    if (!Array.isArray(state.categories) || state.categories.length === 0) state.categories = [...DEFAULT_CATS];
    state.entries = migrateArr(state.entries);
    state.fixed   = migrateArr(state.fixed);
    if (!state.fixedSkips || typeof state.fixedSkips !== "object" || Array.isArray(state.fixedSkips)) state.fixedSkips = {};
  } catch (e) {}
}
let saveTimer;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(KEY, JSON.stringify(state));
    const t = $("#saveTag");
    t.textContent = "保存済み";
    setTimeout(() => t.textContent = "", 1500);
  }, 300);
}

function renderCatManage() {

// ---------- filter state (not persisted) ----------
let filterProv = "all";   // "all" | "confirmed" | "provisional"
let filterCats = [];      // selected categories (empty = all)
let filterMonth = null;   // null | "YYYY-MM"
let filterPanelOpen = false;
let activeDDBtn = null;   // null | "prov" | "month" | "cat"
let lastMonths = [];      // render()で更新される月リスト(DD用)
let filterYearNav = new Date().getFullYear(); // 月ピッカーで表示中の年

// 絞り込みトグルボタンの状態更新
function updateFilterBtn() {
  const active = filterProv !== "all" || filterCats.length > 0 || filterMonth !== null;
  const btn = $("#btnFilterToggle");
  btn.classList.toggle("filter-active", active);
}

// 3つのDDボタンラベルと状態を更新
function updateDDBtns() {
  const isOpen = (t) => activeDDBtn === t;
  const pb = $("#fBtnProv");
  if (pb) {
    const label = filterProv === "all" ? "すべて" : filterProv === "confirmed" ? "確定" : "仮";
    pb.innerHTML = `${label} ${chev(isOpen("prov"))}`;
    pb.classList.toggle("has-filter", filterProv !== "all");
    pb.classList.toggle("dd-open", isOpen("prov"));
  }
  const mb = $("#fBtnMonth");
  if (mb) {
    let label;
    if (filterMonth) {
      const [y, m] = filterMonth.split("-");
      const nowY = String(new Date().getFullYear());
      label = y === nowY ? `${Number(m)}月` : `${y}/${Number(m)}月`;
      mb.classList.add("has-filter");
    } else {
      label = "月";
      mb.classList.remove("has-filter");
    }
    mb.innerHTML = `${label} ${chev(isOpen("month"))}`;
    mb.classList.toggle("dd-open", isOpen("month"));
  }
  const cb = $("#fBtnCat");
  if (cb) {
    let label;
    if (filterCats.length === 0) {
      label = "カテゴリ"; cb.classList.remove("has-filter");
    } else if (filterCats.length === 1) {
      label = esc(filterCats[0]); cb.classList.add("has-filter");
    } else {
      label = `${esc(filterCats[0])}+${filterCats.length - 1}`; cb.classList.add("has-filter");
    }
    cb.innerHTML = `${label} ${chev(isOpen("cat"))}`;
    cb.classList.toggle("dd-open", isOpen("cat"));
  }
}

// 月ピッカー: 年送りヘッダー + 1〜12月の4×3グリッド
function renderMonthDD() {
  const dd = $("#filterDropdown");
  if (!dd) return;
  const y = filterYearNav;
  const avail = new Set(lastMonths);
  const availYears = new Set(lastMonths.map(mk => mk.split("-")[0]));
  const prevDis = !availYears.has(String(y - 1));
  const nextDis = !availYears.has(String(y + 1));
  let html = `<div class="year-nav">
    <button class="year-nav-btn" data-dir="-1"${prevDis?" disabled":""}>‹</button>
    <span>${y}年</span>
    <button class="year-nav-btn" data-dir="1"${nextDis?" disabled":""}>›</button>
  </div><div class="month-grid">`;
  for (let m = 1; m <= 12; m++) {
    const mk = `${y}-${pad(m)}`;
    const ok = avail.has(mk);
    html += `<button class="month-cell${filterMonth===mk?" sel":""}"${ok?"":" disabled"} data-mk="${mk}">${m}月</button>`;
  }
  html += `</div>`;
  dd.innerHTML = html;
  dd.classList.remove("hidden");
  updateDDBtns();
  dd.querySelectorAll(".month-cell:not([disabled])").forEach(b => b.onclick = () => {
    filterMonth = filterMonth === b.dataset.mk ? null : b.dataset.mk;
    updateFilterBtn(); updateDDBtns(); render();
    renderMonthDD();
  });
  dd.querySelectorAll(".year-nav-btn:not([disabled])").forEach(b => b.onclick = () => {
    filterYearNav += Number(b.dataset.dir);
    renderMonthDD();
  });
}

function openDD(type) {
  const dd = $("#filterDropdown");
  if (!dd) return;
  if (activeDDBtn === type) {
    // 同じボタンを再度タップ → 閉じる
    activeDDBtn = null;
    dd.classList.add("hidden");
    updateDDBtns();
    return;
  }
  activeDDBtn = type;
  if (type === "prov") {
    const opts = [["all","すべて"],["confirmed","確定"],["provisional","仮"]];
    dd.innerHTML = `<div class="chip-row">${opts.map(([v,l])=>
      `<button class="chip chip-prov${filterProv===v?" sel":""}" data-prov="${v}">${l}</button>`
    ).join("")}</div>`;
    dd.querySelectorAll(".chip-prov").forEach(b => b.onclick = () => {
      filterProv = b.dataset.prov;
      updateFilterBtn(); updateDDBtns(); render();
    });
  } else if (type === "month") {
    // 年ピッカーを現在選択月 or データのある最も近い年に初期化
    if (filterMonth) {
      filterYearNav = Number(filterMonth.split("-")[0]);
    } else {
      const nowY = new Date().getFullYear();
      const years = [...new Set(lastMonths.map(mk => Number(mk.split("-")[0])))].sort((a,b)=>a-b);
      filterYearNav = years.find(y => y >= nowY) || years[years.length-1] || nowY;
    }
    renderMonthDD();
    return; // renderMonthDD内でdd.classList.remove("hidden")とupdateDDBtns()を実行
  } else if (type === "cat") {
    dd.innerHTML = `<div class="chip-row">${state.categories.map(c =>
      `<button class="chip chip-cat${filterCats.includes(c)?" sel":""}" data-cat="${esc(c)}">${esc(c)}</button>`
    ).join("")}</div>`;
    dd.querySelectorAll(".chip-cat").forEach(b => b.onclick = () => {
      const c = b.dataset.cat;
      if (filterCats.includes(c)) filterCats = filterCats.filter(x => x !== c);
      else filterCats = [...filterCats, c];
      b.classList.toggle("sel", filterCats.includes(c));
      updateFilterBtn(); updateDDBtns();
      render();
    });
  }
  dd.classList.remove("hidden");
  updateDDBtns();
}

// ---------- ledger build ----------
function buildLedger() {
  const now = new Date();
  let minM = new Date(now.getFullYear(), now.getMonth(), 1);
  let maxM = new Date(now.getFullYear(), now.getMonth() + state.monthsAhead, 1);
  for (const e of state.entries) {
    const d = new Date(e.date + "T00:00:00");
    const m = new Date(d.getFullYear(), d.getMonth(), 1);
    if (m < minM) minM = m;
    if (m > maxM) maxM = m;
  }
  const months = [];
  const cur = new Date(minM);
  while (cur <= maxM) { months.push(monthKey(cur)); cur.setMonth(cur.getMonth()+1); }

  const rows = [];
  for (const mk of months) {
    const [y, m] = mk.split("-").map(Number);
    const lastDay = new Date(y, m, 0).getDate();
    for (const fc of state.fixed) {
      const day = Math.min(Number(fc.day) || 1, lastDay);
      const skipList = state.fixedSkips?.[fc.id] || [];
      const skipped = skipList.includes(mk);
      rows.push({ id: fc.id, date: `${mk}-${pad(day)}`, type: fc.type,
                  comment: fc.comment, category: fc.category,
                  amount: Number(fc.amount), isFixed: true, fxMonthKey: mk, skipped });
    }
    for (const e of state.entries)
      if (e.date.startsWith(mk)) rows.push({ ...e, isFixed: false });
  }
  rows.sort((a, b) => a.date === b.date ? (a.isFixed ? -1 : 1) : (a.date < b.date ? -1 : 1));

  let bal = Number(state.startBalance) || 0;
  const byMonth = new Map();
  for (const r of rows) {
    const isProv = !!r.provisional;
    const counted = !isProv || state.includeProvisional;
    if (counted && !r.skipped) bal += r.type === "in" ? r.amount : -r.amount;
    r.balance = bal;
    r.counted = counted;
    const mk = r.date.slice(0, 7);
    if (!byMonth.has(mk)) byMonth.set(mk, { rows: [], inSum: 0, outSum: 0, provInSum: 0, provOutSum: 0 });
    const g = byMonth.get(mk);
    g.rows.push(r);
    if (counted && !r.skipped) r.type === "in" ? g.inSum += r.amount : g.outSum += r.amount;
    if (isProv) r.type === "in" ? g.provInSum += r.amount : g.provOutSum += r.amount;
  }
  return { months, byMonth, finalBalance: bal };
}

// ---------- render ----------
function render() {
  const L = buildLedger();
  const nowMk = monthKey(new Date());
  const today = todayStr();

  $("#balLabel").textContent = `${state.monthsAhead}ヶ月後の見込み残高`;
  const fb = $("#finalBal");
  fb.textContent = (L.finalBalance < 0 ? "−" : "") + yen(L.finalBalance);
  fb.classList.toggle("neg", L.finalBalance < 0);

  // filter state → UI
  const isFiltered = filterProv !== "all" || filterCats.length > 0 || filterMonth !== null;
  const onlyMonthFilter = filterMonth !== null && filterProv === "all" && filterCats.length === 0;
  function rowMatchesFilter(r) {
    const provOk = filterProv === "all" || (filterProv === "confirmed" && !r.provisional) || (filterProv === "provisional" && !!r.provisional);
    const catOk  = filterCats.length === 0 || filterCats.includes(r.category || "その他");
    const monthOk = filterMonth === null || r.date.startsWith(filterMonth);
    return provOk && catOk && monthOk;
  }
  lastMonths = L.months;
  updateDDBtns();

  // filter total
  let filterTotal = 0;
  if (isFiltered) {
    for (const mk of L.months) {
      const g = L.byMonth.get(mk);
      if (!g) continue;
      for (const r of g.rows) if (rowMatchesFilter(r)) filterTotal += r.type === "in" ? r.amount : -r.amount;
    }
  }
  const ftBar = $("#filterTotalBar");
  if (isFiltered) {
    ftBar.classList.remove("hidden");
    ftBar.innerHTML = `フィルター結果の合計: <span>${filterTotal<0?"−":""}${yen(filterTotal)}</span>`;
  } else {
    ftBar.classList.add("hidden");
  }

  // ledger
  let html = "";
  let prevYear = null;
  for (const mk of L.months) {
    const g = L.byMonth.get(mk);
    const [y, m] = mk.split("-");
    const allRows = g?.rows || [];
    const visRows = isFiltered ? allRows.filter(rowMatchesFilter) : allRows;
    if (isFiltered && visRows.length === 0) continue;
    // 年見出し(年が変わるときだけ挿入)
    if (y !== prevYear) { html += `<div class="year-divider">${y}</div>`; prevYear = y; }
    const pTotal = (g?.provInSum||0) + (g?.provOutSum||0);
    const isCollapsed = collapsedMonths.has(mk);
    html += `<section class="month"><div class="month-head" data-mkcol="${mk}">
      <b>${Number(m)}月${mk === nowMk ? '<span class="now-badge">今月</span>' : ""}</b>
      <div class="month-head-right">
        <div class="month-head-sums">
          <span class="sums"><span class="i">入 ${yen(g?.inSum||0)}</span><span class="o">出 ${yen(g?.outSum||0)}</span></span>
          <button class="collapse-btn" data-mkcol="${mk}" aria-label="折りたたみ切替">${chev(!isCollapsed)}</button>
        </div>
        ${pTotal > 0 ? `<div class="prov-hint-sm">うち仮 ${yen(pTotal)}</div>` : ""}
      </div>
    </div>`;
    if (!isCollapsed) {
    if (!visRows.length) html += `<div class="empty">記帳なし</div>`;
    else for (const r of visRows) {
      const rc = [r.date < today?"past":"", r.provisional?"prov":"", r.provisional&&!r.counted?"prov-off":"", r.skipped?"skipped":""].filter(Boolean).join(" ");
      const showBal = !isFiltered || onlyMonthFilter;
      const balHtml = showBal ? `<span class="run${r.balance<0?" neg":""}">残 ${r.balance<0?"−":""}${yen(r.balance)}</span>` : "";
      // コメントがある場合のみカテゴリバッジを表示（コメント無しのときは表示名=カテゴリなので重複を避ける）
      const catBadge = r.comment ? `<span class="cat-badge">${esc(r.category||"その他")}</span>` : "";
      html += `<div class="row${rc?" "+rc:""}"${r.isFixed ? ` data-fxid="${r.id}" data-fxmonth="${r.fxMonthKey}"` : ` data-eid="${r.id}"`}>
        <div class="r-left"><span class="r-date">${Number(r.date.slice(8,10))}日</span>
          <span class="r-name">${esc(dname(r))}${r.isFixed ? '<span class="fx-badge">固定</span>' : ""}${r.provisional ? '<span class="prov-badge">仮</span>' : ""}${catBadge}</span></div>
        <div class="r-right">
          <span class="amt ${r.type==="in"?"i":"o"}">${r.type==="in"?"+":"−"}${yen(r.amount)}</span>
          ${balHtml}</div>
      </div>`;
    }
    } // end !isCollapsed
    html += `</section>`;
  }
  $("#ledger").innerHTML = html;
  // 月ヘッダー折りたたみ
  $$("#ledger .month-head").forEach(head => head.onclick = (ev) => {
    // collapseボタン自体のクリックも同様に処理(バブリング)
    toggleCollapse(head.dataset.mkcol);
  });
  // 折りたたみボタンのバブリング抑止(ヘッダーと二重実行しないため同一関数で処理済み)

  $$("#ledger .row[data-eid]").forEach(row => row.onclick = () => {
    const entry = state.entries.find(e => e.id === row.dataset.eid);
    if (entry) showSheet(entry);
  });
  $$("#ledger .row[data-fxid]").forEach(row => row.onclick = () => {
    const fc = state.fixed.find(f => f.id === row.dataset.fxid);
    const mk = row.dataset.fxmonth;
    if (fc && mk) {
      const isSkipped = (state.fixedSkips?.[fc.id] || []).includes(mk);
      showLedgerFxSheet(fc, mk, isSkipped);
    }
  });

  // category chips
  renderCatChips("aCatChips", addCategoryV, v => addCategoryV = v);
  renderCatChips("fxCatChips", fxCategoryV, v => fxCategoryV = v);
  renderCatManage();

  // fixed list
  let fx = "";
  for (const fc of state.fixed) {
    fx += `<div class="row" data-fxid="${fc.id}">
      <div class="r-left"><span class="r-name">毎月${fc.day}日 ・ ${esc(dname(fc))}</span></div>
      <span class="amt ${fc.type==="in"?"i":"o"}">${fc.type==="in"?"+":"−"}${yen(fc.amount)}</span>
    </div>`;
  }
  $("#fxList").innerHTML = fx || '<div class="empty">固定費はまだありません</div>';
  $$("#fxList .row[data-fxid]").forEach(row => row.onclick = () => {
    const fc = state.fixed.find(f => f.id === row.dataset.fxid);
    if (fc) showFxSheet(fc);
  });
}

    $$("#addType button").forEach(x => x.className = "");

    $$("#provType button").forEach(x => x.className = "");

    editingFxId = null;
    $("#fSubmit").textContent = "固定費を追加";

let editingFxId = null;

// ---------- action sheet (通帳の固定費行 スキップ) ----------
function showLedgerFxSheet(fc, mk, isSkipped) {
  const [y, m] = mk.split("-");
  const nowY = String(new Date().getFullYear());
  const monthLabel = y === nowY ? `${Number(m)}月` : `${y}年${Number(m)}月`;
  $("#ledgerFxSheetInfo").textContent = `${monthLabel} ・ ${dname(fc)}　${fc.type==="in"?"+":"−"}${yen(fc.amount)}`;
  const skipBtn = $("#ledgerFxSheetSkip");
  if (isSkipped) {
    skipBtn.textContent = "スキップを解除";
    skipBtn.className = "sheet-btn sheet-btn-accent";
    skipBtn.onclick = () => {
      hideLedgerFxSheet();
      if (!state.fixedSkips) state.fixedSkips = {};
      state.fixedSkips[fc.id] = (state.fixedSkips[fc.id] || []).filter(x => x !== mk);
      if ((state.fixedSkips[fc.id] || []).length === 0) delete state.fixedSkips[fc.id];
      save(); render();
    };
  } else {
    skipBtn.textContent = "この月はスキップ";
    skipBtn.className = "sheet-btn sheet-btn-danger";
    skipBtn.onclick = () => {
      hideLedgerFxSheet();
      if (!state.fixedSkips) state.fixedSkips = {};
      if (!state.fixedSkips[fc.id]) state.fixedSkips[fc.id] = [];
      if (!state.fixedSkips[fc.id].includes(mk)) state.fixedSkips[fc.id].push(mk);
      save(); render();
    };
  }
  $("#ledgerFxSheet").onclick = ev => { if (ev.target === ev.currentTarget) hideLedgerFxSheet(); };
  $("#ledgerFxSheet").classList.remove("hidden");
}
function hideLedgerFxSheet() { $("#ledgerFxSheet").classList.add("hidden"); }

// ---------- action sheet (ledger) ----------
function showSheet(entry) {
  $("#sheetInfo").textContent = `${dname(entry)}　${entry.type==="in"?"+":"−"}${yen(entry.amount)}`;
  $("#sheetEdit").onclick = () => { hideSheet(); startEdit(entry); };
  const cb = $("#sheetConfirm");
  cb.classList.toggle("hidden", !entry.provisional);
  cb.onclick = () => {
    hideSheet();
    const idx = state.entries.findIndex(e => e.id === entry.id);
    if (idx !== -1) state.entries[idx].provisional = false;
    save(); render();
  };
  $("#sheetDel").onclick = () => {
    hideSheet();
    state.entries = state.entries.filter(e => e.id !== entry.id);
    save(); render();
  };
  $("#actionSheet").onclick = ev => { if (ev.target === ev.currentTarget) hideSheet(); };
  $("#actionSheet").classList.remove("hidden");
}
function hideSheet() { $("#actionSheet").classList.add("hidden"); }
function startEdit(entry) {
  switchTab("add");
  editingId = entry.id;
  addTypeV = entry.type;
  $$("#addType button").forEach(x => x.className = "");
  [...$$("#addType button")].find(b => b.dataset.v === entry.type).className =
    entry.type === "in" ? "sel-in" : "sel-out";
  $("#aDate").value = entry.date;
  $("#aName").value = entry.comment || "";
  $("#aAmt").value = entry.amount;
  addProvisional = !!entry.provisional;
  $$("#provType button").forEach(x => x.className = "");
  [...$$("#provType button")].find(b => b.dataset.v === String(addProvisional)).className =
    addProvisional ? "sel-prov" : "sel-in";
  addCategoryV = entry.category || "その他";
  renderCatChips("aCatChips", addCategoryV, v => addCategoryV = v);
  $("#aCancelEdit").classList.remove("hidden");
  $("#aSubmit").textContent = "上書き保存";
}

// ---------- edit cancel ----------
$("#aCancelEdit").onclick = () => {
  const id = editingId;
  switchTab("ledger");
  if (id) scrollAndHighlight(id);
};
$("#fxCancelEdit").onclick = () => switchTab("fixed");

// ---------- add entry ----------
$("#aDate").value = todayStr();
$("#aSubmit").onclick = () => {
  const comment = $("#aName").value.trim(); // 任意
  const amt  = Number($("#aAmt").value.replace(/[,，]/g, ""));
  const date = $("#aDate").value;
  if (!amt || !date) return; // カテゴリは常に選択済み
  const savedEditId = editingId; // スクロール用に先に保存
  if (editingId) {
    const idx = state.entries.findIndex(e => e.id === editingId);
    if (idx !== -1) {
      const { name, ...rest } = state.entries[idx]; // 旧 name フィールドを除去
      state.entries[idx] = { ...rest, date, type: addTypeV, comment, amount: amt, provisional: addProvisional, category: addCategoryV };
    }
    editingId = null;
    $("#aSubmit").textContent = "記帳する";
    $("#aCancelEdit").classList.add("hidden");
  } else {
    state.entries.push({ id: uid(), date, type: addTypeV, comment, amount: amt, provisional: addProvisional, category: addCategoryV });
  }
  $("#aName").value = ""; $("#aAmt").value = "";
  save(); render();
  switchTab("ledger");
  if (savedEditId) scrollAndHighlight(savedEditId);
};

// ---------- add fixed ----------
$("#fSubmit").onclick = () => {
  const comment = $("#fName").value.trim(); // 任意
  const amt = Number($("#fAmt").value.replace(/[,，]/g, ""));
  const day = Math.min(Math.max(Number($("#fDay").value) || 1, 1), 31);
  if (!amt) return; // カテゴリは常に選択済み
  if (editingFxId) {
    const idx = state.fixed.findIndex(f => f.id === editingFxId);
    if (idx !== -1) {
      const { name, ...rest } = state.fixed[idx]; // 旧 name フィールドを除去
      state.fixed[idx] = { ...rest, comment, amount: amt, day, type: fxTypeV, category: fxCategoryV };
    }
    editingFxId = null;
    $("#fSubmit").textContent = "固定費を追加";
    $("#fxCancelEdit").classList.add("hidden");
  } else {
    state.fixed.push({ id: uid(), comment, amount: amt, day, type: fxTypeV, category: fxCategoryV });
  }
  $("#fName").value = ""; $("#fAmt").value = "";
  save(); render();
};

// ---------- settings ----------
$("#sBal").onchange = () => {
  state.startBalance = Number($("#sBal").value.replace(/[,，]/g, "")) || 0;
  save(); render();
};
$("#sAhead").onchange = () => {
  state.monthsAhead = Number($("#sAhead").value);
  save(); render();
};
$("#btnAddCat").onclick = () => {
  const name = $("#newCatInput").value.trim();
  if (!name || state.categories.includes(name)) return;
  state.categories.push(name);
  $("#newCatInput").value = "";
  save(); render();
};
$("#btnExport").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `cashflow-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};
$("#btnImport").onclick = () => $("#importFile").click();
$("#importFile").onchange = (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (!Array.isArray(d.entries)) throw new Error();
      state = Object.assign({ startBalance:0, entries:[], fixed:[], fixedSkips:{}, monthsAhead:3, includeProvisional:true, categories:[...DEFAULT_CATS] }, d);
      if (!Array.isArray(state.categories) || state.categories.length === 0) state.categories = [...DEFAULT_CATS];
      if (!state.fixedSkips || typeof state.fixedSkips !== "object" || Array.isArray(state.fixedSkips)) state.fixedSkips = {};
      state.entries = migrateArr(state.entries);
      state.fixed   = migrateArr(state.fixed);
      $("#sBal").value = state.startBalance;
      $("#sAhead").value = state.monthsAhead;
      $("#toggleProv").checked = state.includeProvisional;
      save(); render();
      alert("読み込みました");
    } catch { alert("読み込めないファイルです。書き出したJSONを選んでください。"); }
  };
  r.readAsText(file);
  ev.target.value = "";
};
$("#btnClear").onclick = () => {
  if (confirm("すべての記帳データを削除しますか?")) {
    state = { startBalance: 0, entries: [], fixed: [], fixedSkips: {}, monthsAhead: 3, includeProvisional: state.includeProvisional, categories: state.categories };
    $("#sBal").value = 0;
    save(); render();
  }
};

// ---------- init ----------
load();
loadCollapsed();
$("#sBal").value = state.startBalance;
$("#sAhead").value = state.monthsAhead;
$("#toggleProv").checked = state.includeProvisional;
$("#toggleProv").onchange = () => { state.includeProvisional = $("#toggleProv").checked; save(); render(); };
$("#btnFilterToggle").onclick = () => {
  filterPanelOpen = !filterPanelOpen;
  $("#filterPanel").classList.toggle("hidden", !filterPanelOpen);
  if (!filterPanelOpen) { activeDDBtn = null; const dd = $("#filterDropdown"); if (dd) dd.classList.add("hidden"); }
};
// DDBtns click
(function() {
  const pairs = [["fBtnProv","prov"],["fBtnMonth","month"],["fBtnCat","cat"]];
  pairs.forEach(([id, type]) => {
    const btn = $("#"+id);
    if (btn) btn.onclick = () => openDD(type);
  });
})();
render();

// ---------- Service Worker ----------
let swReg = null;
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(reg => {
    swReg = reg;
    // フォアグラウンドで長時間開いている場合の定期チェック (30 分おき)
    setInterval(() => reg.update(), 30 * 60 * 1000);
  }).catch(() => {});
}

// 設定タブの「アプリを更新」ボタン (手動キャッシュ破棄)
$("#btnSWUpdate").onclick = async () => {
  try {
    if (swReg) await swReg.update();
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  } catch (e) {}
  location.reload();
};
</script>
</body>
</html>
